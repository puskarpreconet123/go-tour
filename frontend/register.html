<!doctype html>
<html lang="en">
   
<head>
      <!-- Required meta tags -->
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

      <link rel="icon" type="image/png" href="assets/images/favicon.png">
      <link rel="stylesheet" href="assets/vendors/bootstrap/css/bootstrap.min.css" media="all">
      <link rel="stylesheet" type="text/css" href="assets/vendors/jquery-ui/jquery-ui.min.css">
      <link rel="stylesheet" type="text/css" href="assets/vendors/fancybox/dist/jquery.fancybox.min.css">
      <link rel="stylesheet" type="text/css" href="assets/vendors/fontawesome/css/all.min.css">
      <link rel="stylesheet" type="text/css" href="assets/vendors/elementskit-icon-pack/assets/css/ekiticons.css">
      <link rel="stylesheet" type="text/css" href="assets/vendors/slick/slick.css">
      <link rel="stylesheet" type="text/css" href="assets/vendors/slick/slick-theme.css">
      <link rel="stylesheet" type="text/css" href="style.css">
      <title>Gotour - Sign Up</title>
      <style>
         header {
            display: none !important;
         }
         #page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
         }
         main {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin: 0 !important;
            padding: 0 !important;
         }
         footer {
            margin-top: 0 !important;
         }
         .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 40px 0;
         }
         .auth-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            transition: all 0.3s ease;
         }
         .auth-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
         }
         .auth-title {
            font-size: 28px;
            font-weight: 750;
            color: #223645;
            margin-bottom: 8px;
            text-align: center;
         }
         .auth-subtitle {
            color: #626672;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
         }
         .auth-form .form-group {
            margin-bottom: 20px;
         }
         .auth-form label {
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #223645;
            margin-bottom: 6px;
            display: block;
         }
         .auth-form input {
            border-radius: 12px;
            border: 1.5px solid #dcdcdc;
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.2s ease;
            width: 100%;
            outline: none;
         }
         .auth-form input:focus {
            border-color: #3A78C9;
            box-shadow: 0 0 0 3px rgba(58, 120, 201, 0.15);
         }
         .auth-btn {
            background-color: #3A78C9;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 10px;
            cursor: pointer;
         }
         .auth-btn:hover {
            background-color: #2e5fa0;
            box-shadow: 0 5px 15px rgba(58, 120, 201, 0.2);
         }
         .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #626672;
         }
         .auth-footer a {
            color: #3A78C9;
            font-weight: 600;
            text-decoration: none;
         }
         .auth-footer a:hover {
            text-decoration: underline;
         }
         .alert-error {
            background: #fff5f5;
            border: 1px solid #ffccd5;
            color: #d9383a;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
         }
      </style>
   </head>
   <body class="home">
      <div id="page" class="page">

         <header id="masthead" class="site-header">
            <div class="bottom-header">
               <div class="container">
                  <div class="bottom-header-inner d-flex justify-content-between align-items-center">
                    
                     <div class="site-logo text-center">
                        <h1 class="site-title">
                           <a href="index.html">
                              <img src="assets/images/site-logo.png" alt="Logo" class="default-logo">
                              <img src="assets/images/site-logo2.png" alt="Logo" class="fixed-logo">
                           </a>
                        </h1>
                     </div>
                     <div class="navigation-container d-none d-lg-block">
                        <nav id="navigation" class="navigation">
                           <ul>
                              <li>
                                 <a href="index.html">Home</a>
                              </li>
                              <li>
                                 <a href="about.html">about us</a>
                              </li>
                              <li>
                                 <a href="destination.html">My Trips</a>
                              </li>
                              <li>
                                 <a href="gallery.html">Gallery</a>
                              </li>
                              <li>
                                 <a href="contact.html">contact us</a>
                              </li>
                           </ul>
                        </nav>
                     </div>
                     <div class="header-btn">
                        <a href="login.html" class="round-btn">Login</a>
                     </div>
                  </div>
               </div>
            </div>
         </header>

         <main id="content" class="site-main">
            <section class="auth-wrapper">
               <div class="container d-flex justify-content-center">
                  <div class="auth-card">
                     <h2 class="auth-title">Sign Up</h2>
                     <p class="auth-subtitle">Create a new account to plan your journey</p>
                     
                     <div id="register-error" class="alert-error">
                        <i class="fas fa-exclamation-circle"></i>
                        <span class="error-msg"></span>
                     </div>
                     
                     <form id="register-form" class="auth-form">
                        <div class="form-group">
                           <label>Full Name</label>
                           <input type="text" id="name" required placeholder="e.g. John Doe">
                        </div>
                        <div class="form-group">
                           <label>Email Address</label>
                           <input type="email" id="email" required placeholder="e.g. john@example.com">
                        </div>
                        <div class="form-group">
                           <label>Password</label>
                           <input type="password" id="password" required minlength="8" placeholder="At least 8 characters">
                        </div>
                        <button type="submit" class="auth-btn">Sign Up</button>
                     </form>
                     
                     <div class="auth-footer">
                        Already have an account? <a href="login.html">Sign In</a>
                     </div>
                  </div>
               </div>
            </section>
         </main>

         <footer id="colophon" class="site-footer footer-primary">
            <div class="bottom-footer">
               <div class="container">
                  <div class="copy-right text-center">Copyright &copy; 2026 Gotour. All rights reserved.</div>
               </div>
            </div>
         </footer>
         
      </div>

      <script src="assets/vendors/jquery/jquery.js"></script>
      <script src="assets/vendors/bootstrap/js/bootstrap.min.js"></script>
      <script src="assets/js/auth.js"></script>
      <script src="assets/js/app.js"></script>
      <script>
         document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('register-error');
            const errorMsg = errorDiv.querySelector('.error-msg');
            
            errorDiv.style.display = 'none';
            
            const result = await registerUser(name, email, password);
            
            if (result.success) {
               // Redirect to redirect parameter URL or default home page
               const urlParams = new URLSearchParams(window.location.search);
               const redirect = urlParams.get('redirect') || 'index.html';
               window.location.href = decodeURIComponent(redirect);
            } else {
               errorMsg.textContent = result.error || 'Registration failed. Please try again.';
               errorDiv.style.display = 'flex';
            }
         });
      </script>
   </body>
</html>
